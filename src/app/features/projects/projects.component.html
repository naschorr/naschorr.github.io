<div class="bg-gradient-dark flex flex-col min-h-screen w-screen">
  <header [containerClasses]="['scrollbar-offset', 'px-3']" [marginLeft]="marginLeft" [marginRight]="marginRight" title="Portfolio"></header>

  <div class="flex flex-col xl:flex-row m-3 scrollbar-offset">
    <div id="primary-gutter" class="flex-1 shrink-[2] flex xl:justify-end xl:mr-3 mr-0 xl:mb-0 mb-3">
      <div class="project-filter-container gap-3"
        [ngStyle]="{
          'width': isXLOrGreater() ? marginLeft + 'px' : 'auto',
          'right': isXLOrGreater() ? marginLeftDistanceToScreenRightEdge + 'px' : 'auto'
        }"
        [style.--headerHeight]="headerHeight + 'px'">
        <project-filter></project-filter>
      </div>
    </div>

    <main class="container flex flex-col shrink-[1] min-w-0 gap-3 mx-auto">
      @for (project of projects; track project; let i = $index) {
        <project [project]="project" [flash]="requestedProjectId == project.id"></project>
      }
      @if (projects.length === 0) {
        <div class="color-light text-center my-6">
          <span class="opacity-70">No projects match the selected filters.</span>
        </div>
      }
    </main>

    <div id="secondary-gutter" class="flex-1 shrink-[3]"></div>
  </div>

  <footer [containerClasses]="['scrollbar-offset', 'mb-3', 'px-3']" [marginLeft]="marginLeft" [marginRight]="marginRight"></footer>
</div>
